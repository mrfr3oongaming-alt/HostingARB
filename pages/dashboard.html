<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - arbHostingCraft</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0a0a0a]">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center" onclick="window.location.href='../index.html'">
                    <svg viewBox="0 0 100 100" class="w-10 h-10 ml-3 drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">
                        <defs>
                            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FFD700" />
                                <stop offset="100%" stop-color="#F97316" />
                            </linearGradient>
                        </defs>
                        <path d="M50 5 L90 20 L90 50 C90 75 50 95 50 95 C50 95 10 75 10 50 L10 20 Z" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>
                        <path d="M50 15 L80 27 L80 50 C80 68 50 83 50 83 C50 83 20 68 20 50 L20 27 Z" fill="url(#goldGrad)"/>
                        <rect x="42" y="35" width="16" height="16" fill="#0a0a0a" rx="2"/>
                    </svg>
                    <span class="font-bold text-2xl tracking-wide">arb<span class="text-gradient">Hosting</span>Craft</span>
                </div>
                <div class="hidden md:flex items-center space-x-4 space-x-reverse">
                    <a href="../index.html" class="text-zinc-300 hover:text-white font-medium text-sm transition">الرئيسية</a>
                    <a href="order.html" class="text-zinc-300 hover:text-white font-medium text-sm transition">طلب سيرفر جديد</a>
                    <a href="../index.html" class="text-red-400 hover:text-red-300 font-medium text-sm transition">تسجيل الخروج</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <section class="pt-28 pb-12 bg-brand-black min-h-screen">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold">لوحة التحكم</h2>
                    <p class="text-zinc-400 text-sm mt-1">مرحباً بك، أحمد محمد</p>
                </div>
                <a href="order.html" class="px-4 py-2 bg-brand-orange hover:bg-brand-orange/80 rounded-lg text-sm transition flex items-center gap-2 font-bold text-black">
                    <i class="fa-solid fa-plus"></i> سيرفر جديد
                </a>
            </div>

            <!-- Server Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                
                <!-- Server 1 - Free -->
                <div class="glass-card p-6 rounded-xl border border-zinc-700 hover:border-brand-gold transition">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-14 h-14 bg-zinc-900 rounded-lg flex items-center justify-center border border-zinc-800 relative">
                            <i class="fa-solid fa-cubes text-2xl text-brand-gold"></i>
                            <div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-zinc-900 animate-pulse"></div>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg">سيرفر التجربة</h3>
                            <span class="text-xs text-brand-orange">مجاني (2GB)</span>
                        </div>
                    </div>
                    <div class="text-sm text-zinc-400 font-mono mb-4">IP: play.arbhostingcraft.free</div>
                    <div class="flex gap-2">
                        <button onclick="window.location.href='../index.html#dashboard'" class="flex-1 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-brand-gold text-brand-gold rounded-lg text-sm transition font-bold">
                            <i class="fa-solid fa-gauge-high ml-1"></i> إدارة
                        </button>
                    </div>
                </div>

                <!-- Server 2 - Premium -->
                <div class="glass-card p-6 rounded-xl border border-brand-gold hover:border-brand-gold transition shadow-[0_0_20px_rgba(255,215,0,0.1)]">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-14 h-14 bg-zinc-900 rounded-lg flex items-center justify-center border border-zinc-800 relative">
                            <i class="fa-solid fa-cubes text-2xl text-brand-gold"></i>
                            <div class="absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border-2 border-zinc-900 animate-pulse"></div>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg">سيرفر البقاء</h3>
                            <span class="text-xs text-brand-gold">مميز (8GB)</span>
                        </div>
                    </div>
                    <div class="text-sm text-zinc-400 font-mono mb-4">IP: survival.arbhostingcraft.com</div>
                    <div class="flex gap-2">
                        <button onclick="window.location.href='../index.html#dashboard'" class="flex-1 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 border border-brand-gold text-brand-gold rounded-lg text-sm transition font-bold">
                            <i class="fa-solid fa-gauge-high ml-1"></i> إدارة
                        </button>
                    </div>
                </div>

                <!-- Server 3 - Empty -->
                <div class="glass-card p-6 rounded-xl border border-dashed border-zinc-700 hover:border-brand-orange transition flex flex-col items-center justify-center min-h-[200px]">
                    <i class="fa-solid fa-plus text-4xl text-zinc-600 mb-3"></i>
                    <p class="text-zinc-500 text-sm">ليس لديك سيرفرات أخرى</p>
                    <a href="order.html" class="mt-4 px-4 py-2 bg-brand-orange/20 hover:bg-brand-orange/30 text-brand-orange rounded-lg text-sm transition font-bold">
                        إنشاء سيرفر جديد
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="../js/main.js"></script>
</body>
</html>
