<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - arbHostingCraft</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-[#0a0a0a]">

    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex-shrink-0 flex items-center" onclick="window.location.href='../index.html'">
                    <svg viewBox="0 0 100 100" class="w-10 h-10 ml-3 drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">
                        <defs>
                            <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#FFD700" />
                                <stop offset="100%" stop-color="#F97316" />
                            </linearGradient>
                        </defs>
                        <path d="M50 5 L90 20 L90 50 C90 75 50 95 50 95 C50 95 10 75 10 50 L10 20 Z" fill="none" stroke="url(#goldGrad)" stroke-width="6"/>
                        <path d="M50 15 L80 27 L80 50 C80 68 50 83 50 83 C50 83 20 68 20 50 L20 27 Z" fill="url(#goldGrad)"/>
                        <rect x="42" y="35" width="16" height="16" fill="#0a0a0a" rx="2"/>
                    </svg>
                    <span class="font-bold text-2xl tracking-wide">arb<span class="text-gradient">Hosting</span>Craft</span>
                </div>
                <div class="hidden md:flex items-center space-x-4 space-x-reverse">
                    <a href="../index.html" class="text-zinc-300 hover:text-white font-medium text-sm transition">الرئيسية</a>
                    <a href="../index.html#plans" class="text-zinc-300 hover:text-white font-medium text-sm transition">الخطط</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="min-h-screen pt-32 pb-12 flex items-center justify-center bg-[url('https://images.unsplash.com/photo-1607513746994-4903df1904d4?q=80&w=2000&auto=format&fit=crop')] bg-cover relative">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm z-0"></div>
        
        <div class="glass-card p-8 rounded-2xl w-full max-w-md relative z-10 shadow-[0_0_50px_rgba(0,0,0,0.5)]">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold mb-2">تسجيل الدخول</h2>
                <p class="text-zinc-400 text-sm">أهلاً بك مجدداً، أدخل بياناتك للوصول إلى لوحة التحكم</p>
            </div>
            
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">البريد الإلكتروني</label>
                    <input type="email" required class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-700 rounded-lg focus:outline-none focus:border-brand-orange text-white" placeholder="yourname@domain.com">
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="block text-sm font-medium text-zinc-300">كلمة المرور</label>
                        <a href="#" class="text-xs text-brand-gold hover:underline">نسيت كلمة المرور؟</a>
                    </div>
                    <input type="password" required class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-700 rounded-lg focus:outline-none focus:border-brand-orange text-white" placeholder="••••••••">
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded border-zinc-700 text-brand-orange focus:ring-brand-orange bg-zinc-900">
                    <label for="remember" class="ml-2 mr-2 block text-sm text-zinc-400">تذكر تسجيل دخولي</label>
                </div>
                
                <button type="submit" class="w-full py-3 rounded-lg btn-brand text-black font-bold text-lg mt-4">تسجيل الدخول</button>
            </form>
            
            <div class="mt-6 text-center text-sm text-zinc-400">
                ليس لديك حساب حالي؟ <a href="register.html" class="text-brand-orange font-bold hover:underline">إنشاء حساب جديد مجاناً</a>
            </div>
        </div>
    </section>

    <script src="../js/main.js"></script>
</body>
</html>
